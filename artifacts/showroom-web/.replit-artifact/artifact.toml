kind = "web"
previewPath = "/showroom-web/"
title = "Lexus RX300 Showroom"
version = "1.0.0"
id = "artifacts/showroom-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/showroom-web/" ]
localPort = 21618

[services.development]
run = "pnpm --filter @workspace/showroom-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/showroom-web", "run", "build" ]
publicDir = "artifacts/showroom-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21618"
BASE_PATH = "/showroom-web/"
