openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project orchestration operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      description: Returns a paginated list of projects ordered by creation date (newest first).
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project from a prompt
      description: Accepts a natural language prompt, creates a project record, and kicks off async AI spec generation following Golden Path templates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project status and files
      description: Returns project status, spec, generated file tree, and deploy URL. Poll-friendly.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetails"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{id}/approve-spec:
    post:
      operationId: approveSpec
      tags: [projects]
      summary: Approve the architectural spec and begin code generation
      description: Transitions project from planned to generating status and kicks off code generation using the approved spec.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spec approved and generation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveSpecResponse"
        "400":
          description: Project not in planned status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{id}/deploy:
    post:
      operationId: deployProject
      tags: [projects]
      summary: Deploy a generated project
      description: Packages generated code and deploys it to a live preview URL.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deployment triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployProjectResponse"
        "400":
          description: Project not ready for deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateProjectBody:
      type: object
      properties:
        prompt:
          type: string
          description: Natural language description of the application to build
      required:
        - prompt
    CreateProjectResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, planning, planned, generating, ready, deployed, failed]
      required:
        - id
        - status
    ProjectFile:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
        - path
        - content
    GoldenPathCheck:
      type: object
      properties:
        name:
          type: string
        passed:
          type: boolean
        description:
          type: string
      required:
        - name
        - passed
        - description
    ApiEndpointSpec:
      type: object
      properties:
        method:
          type: string
        path:
          type: string
        description:
          type: string
      required:
        - method
        - path
        - description
    DatabaseTableSpec:
      type: object
      properties:
        name:
          type: string
        columns:
          type: array
          items:
            type: string
      required:
        - name
        - columns
    ProjectSpec:
      type: object
      properties:
        overview:
          type: string
        fileStructure:
          type: array
          items:
            type: string
        apiEndpoints:
          type: array
          items:
            $ref: "#/components/schemas/ApiEndpointSpec"
        databaseTables:
          type: array
          items:
            $ref: "#/components/schemas/DatabaseTableSpec"
        middleware:
          type: array
          items:
            type: string
        architecturalDecisions:
          type: array
          items:
            type: string
      required:
        - overview
        - fileStructure
        - apiEndpoints
        - databaseTables
        - middleware
        - architecturalDecisions
    ProjectDetails:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        status:
          type: string
          enum: [pending, planning, planned, generating, ready, deployed, failed]
        spec:
          $ref: "#/components/schemas/ProjectSpec"
        files:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFile"
        goldenPathChecks:
          type: array
          items:
            $ref: "#/components/schemas/GoldenPathCheck"
        deployUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        error:
          type: string
          nullable: true
      required:
        - id
        - prompt
        - status
        - files
        - goldenPathChecks
        - createdAt
    ApproveSpecResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [generating]
      required:
        - id
        - status
    DeployProjectResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [deployed]
        deployUrl:
          type: string
      required:
        - id
        - status
        - deployUrl
    ProjectSummary:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        status:
          type: string
          enum: [pending, planning, planned, generating, ready, deployed, failed]
        fileCount:
          type: integer
        goldenPathScore:
          type: string
          description: "Pass rate like '9/9'"
        deployUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        error:
          type: string
          nullable: true
      required:
        - id
        - prompt
        - status
        - fileCount
        - goldenPathScore
        - createdAt
    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - projects
        - total
        - limit
        - offset
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
